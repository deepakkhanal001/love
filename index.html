<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Babe ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* sections */

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
max-width:500px;
margin:auto;
}

/* typewriter */

#typewriter{
font-size:22px;
line-height:1.6;
max-width:400px;
}

/* button */

button{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#203a43;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- background music -->

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c0c3c1d4c.mp3?filename=romantic-piano-110086.mp3" type="audio/mpeg">
</audio>


<section>

<h1>Hi Babe ❤️</h1>

<p>
Please scroll slowly.
This page is from my heart.
</p>

</section>


<section>

<div id="typewriter"></div>

</section>


<section>

<h1>One Honest Question</h1>

<p>
Will you give us another chance?
</p>

<button onclick="yes()">Yes… I’ll Stay ❤️</button>

</section>


<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*2+1)+"s";
document.body.appendChild(star);
}

/* typewriter message */

const text = `Babe...

I know I hurt you.

And if I could take that pain away,
I would do it a thousand times.

You are not just someone in my life.

You are the person who made my world brighter,
my days happier,
and my heart fuller.

Without you things feel empty.

I miss your smile.
I miss your voice.
I miss the little moments that made life beautiful.

I promise to learn.
I promise to grow.
And I promise to protect your heart better.

Because the truth is...

I love you.

And I don't want a future
that doesn't have you in it.`;

let i = 0;

function typing(){

if(i < text.length){

document.getElementById("typewriter").innerHTML += text.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

/* final message */

function yes(){

document.body.innerHTML = `

<div style="height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:40px;">

<div>

<h1>I Love You Babe ❤️</h1>

<p>
Thank you for giving us another chance.
</p>

<p>
And even if things take time...

I will wait for you.
</p>

<p>
Because you are worth every moment.
</p>

</div>

</div>

`;

}

</script>

</body>
</html>
