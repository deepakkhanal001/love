<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Everything ❤️</title>
    <style>
        :root {
            --primary-glow: rgba(255, 182, 193, 0.6);
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Star Background */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: move-twinkle var(--duration) linear infinite;
            z-index: 0;
        }

        @keyframes move-twinkle {
            from { transform: translateY(0); opacity: 0.3; }
            to { transform: translateY(-100vh); opacity: 1; }
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--primary-glow);
            margin-bottom: 20px;
        }

        #typewriter {
            font-size: 1.3rem;
            line-height: 1.8;
            max-width: 600px;
            white-space: pre-wrap;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        /* Fixed Button Container */
        .btn-container {
            margin-top: 50px;
            display: flex;
            gap: 30px; /* Space between buttons */
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #yesBtn {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            z-index: 10;
        }

        #noBtn {
            background: #e0e0e0;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            /* Important: No absolute positioning until it moves */
            position: relative; 
            z-index: 5;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c0c3c1d4c.mp3?filename=romantic-piano-110086.mp3" type="audio/mpeg">
</audio>

<section>
    <h1>Hi Babe ❤️</h1>
    <p style="font-style: italic; opacity: 0.8;">Please scroll slowly...</p>
    <div class="scroll-indicator">↓ Scroll for my heart ↓</div>
</section>

<section id="message-section">
    <div id="typewriter"></div>
</section>

<section id="question-section">
    <h1>The Only Thing That Matters...</h1>
    <p>Will you give us another chance to be "us"?</p>
    
    <div class="btn-container">
        <button id="yesBtn" onclick="yes()">Yes… I’ll Stay ❤️</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
</section>

<script>
    function createStars() {
        for (let i = 0; i < 120; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 3 + "px";
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 5 + 5) + "s");
            document.body.appendChild(star);
        }
    }
    createStars();

    const text = `I know I’ve made mistakes, and I know I hurt you. If I could go back and protect your heart from that pain, I’d do it in a heartbeat.

You aren't just a part of my life—you are the light in it. Everything feels a little darker, a little quieter, and a lot emptier without your smile.

I’m not asking for things to be perfect right away. I’m just asking to try. I promise to listen more, to grow, and to cherish you the way you’ve always deserved.

Because the truth is simple: I love you. And I can't see a "forever" if you aren't there with me.`;

    let i = 0;
    let hasStarted = false;

    function typing() {
        if (i < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 45); 
        }
    }

    const observer = new IntersectionObserver((entries) => {
        if(entries[0].isIntersecting && !hasStarted) {
            hasStarted = true;
            typing();
            document.getElementById('bgMusic').play().catch(() => {});
        }
    });
    observer.observe(document.getElementById('message-section'));

    function moveButton() {
        const noBtn = document.getElementById('noBtn');
        
        // Switch to fixed positioning only when she tries to click it
        noBtn.style.position = 'fixed';
        
        // Random position within the safe area of the screen
        const maxX = window.innerWidth - noBtn.offsetWidth - 50;
        const maxY = window.innerHeight - noBtn.offsetHeight - 50;
        
        const randomX = Math.max(50, Math.floor(Math.random() * maxX));
        const randomY = Math.max(50, Math.floor(Math.random() * maxY));
        
        noBtn.style.left = randomX + 'px';
        noBtn.style.top = randomY + 'px';
    }

    function yes() {
        document.body.innerHTML = `
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background: radial-gradient(circle, #2c5364, #0f2027); animation: fadeIn 2s; text-align:center; padding: 20px;">
            <h1 style="font-size:3.5rem; margin-bottom:10px; color: white;">I Love You ❤️</h1>
            <p style="font-size:1.3rem; max-width:500px; line-height:1.6; color: white;">Thank you for your heart. I won't let you down.</p>
            <div style="font-size:70px; margin-top:20px; animation: pulse 1.5s infinite;">💖</div>
        </div>
        <style>
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        </style>`;
    }
</script>

</body>
</html>
