<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message From My Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff758c;
            --bg-dark: #0a0c10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* High-Performance Canvas for Starfield */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        section {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInReveal 1.5s ease forwards;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
            border-radius: 24px;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #typewriter {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            min-height: 200px;
            white-space: pre-wrap;
        }

        /* Modernized Buttons */
        .controls {
            display: flex;
            gap: 1.5rem;
            margin-top: 3rem;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: none;
            outline: none;
        }

        #yesBtn {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
        }

        #yesBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.5);
        }

        #noBtn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
        }

        /* Animations */
        @keyframes fadeInReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 10px var(--accent));
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c0c3c1d4c.mp3?filename=romantic-piano-110086.mp3" type="audio/mpeg">
</audio>

<section>
    <h1>Hi Babe.</h1>
    <div class="glass-card" style="padding: 1.5rem 3rem;">
        <p>This isn't just code. It's everything I'm feeling.</p>
    </div>
    <div class="scroll-hint">Scroll Slowly</div>
</section>

<section id="msg-trigger">
    <div class="glass-card">
        <div id="typewriter"></div>
    </div>
</section>

<section>
    <h1>The Final Question</h1>
    <div class="controls" id="btnContainer">
        <button class="btn" id="yesBtn" onclick="celebrate()">Yes... I'll Stay ❤️</button>
        <button class="btn" id="noBtn" onmouseover="evade()">No</button>
    </div>
</section>

<script>
    /* 1. Senior Level Star Physics */
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Star {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.speed = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.y -= this.speed;
            if (this.y < 0) this.reset();
        }
        draw() {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 200; i++) stars.push(new Star());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    /* 2. Typewriter with Logic Observer */
    const text = `I've spent a lot of time thinking about where things went wrong. 

Code can be fixed, bugs can be patched, but I know hearts are more fragile. I’m sorry I didn't handle yours with the care it deserves.

You are the most important part of my world. Without you, the days feel like loops without an exit. 

I’m ready to put in the work—not just for us, but for you. Because I love you, and I’m not ready to let our story end here.`;

    let charIdx = 0;
    let started = false;

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !started) {
            started = true;
            document.getElementById('bgMusic').play().catch(() => {});
            type();
        }
    }, { threshold: 0.5 });

    observer.observe(document.getElementById('msg-trigger'));

    function type() {
        if (charIdx < text.length) {
            document.getElementById('typewriter').textContent += text[charIdx];
            charIdx++;
            setTimeout(type, 40);
        }
    }

    /* 3. The "Intelligent" Runaway Button */
    function evade() {
        const btn = document.getElementById('noBtn');
        // Calculate random position while keeping button on screen
        const x = Math.random() * (window.innerWidth - btn.offsetWidth - 100) + 50;
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - 100) + 50;
        
        btn.style.position = 'fixed';
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
        btn.style.zIndex = '999';
    }

    /* 4. Final State Handled Gracefully */
    function celebrate() {
        document.body.innerHTML = `
            <canvas id="starCanvas"></canvas>
            <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; position:relative;">
                <div class="heart-icon">💖</div>
                <h1 style="background:none; -webkit-text-fill-color:white; margin-top:2rem;">I Promise to Love You Better.</h1>
                <p style="opacity:0.8;">Thank you for giving me another chance.</p>
            </div>
        `;
        // Re-init stars for the final screen
        const newCanvas = document.getElementById('starCanvas');
        const newCtx = newCanvas.getContext('2d');
        newCanvas.width = window.innerWidth;
        newCanvas.height = window.innerHeight;
        // ... (Animation loop could be re-added here, but simplified for the response)
    }
</script>
</body>
</html>
