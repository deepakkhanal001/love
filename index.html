<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    max-width:350px;
}

h1{
    font-size:28px;
}

p{
    font-size:18px;
    margin-top:20px;
}

button{
    margin-top:30px;
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

#mobileWarning{
    display:none;
    font-size:22px;
}
</style>
</head>

<body>

<div id="mobileWarning">
Please open this on your phone ❤️
</div>

<div class="container" id="mainContent">
<h1>I'm Sorry ❤️</h1>

<p>
I know I made mistakes.  
But my heart still belongs to you.  

You are the best thing that ever happened to me.  
I truly miss you.  

Please forgive me...  
</p>

<p>
I love you more than words can explain.
</p>

<button onclick="love()">Come Back To Me ❤️</button>

</div>

<script>
if(window.innerWidth > 768){
document.getElementById("mainContent").style.display="none";
document.getElementById("mobileWarning").style.display="block";
}

function love(){
document.body.innerHTML = `
<div style="text-align:center;color:white;">
<h1>I Love You ❤️</h1>
<p>Thank you for giving me another chance.</p>
<p>You mean everything to me.</p>
</div>
`;
}
</script>

</body>
</html>
